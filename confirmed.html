<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Confirmed — Flick Match</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0B0F1A;--bg-card:#111827;--border:#1E2A3A;--accent:#4F8EF7;--text:#F5F7FA;--muted:#8A98B0;--white:#fff}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 48px;background:rgba(11,15,26,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
    .nav-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:18px;color:var(--white);text-decoration:none;letter-spacing:-.3px}
    .nav-logo span{color:var(--accent)}
    main{flex:1;display:flex;align-items:center;justify-content:center;padding:140px 24px 80px}
    .card{max-width:480px;text-align:center}
    .badge{width:84px;height:84px;border-radius:50%;margin:0 auto 28px;display:flex;align-items:center;justify-content:center;background:rgba(79,142,247,.12);border:1px solid rgba(79,142,247,.3)}
    h1{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;letter-spacing:-.6px;color:var(--white);margin-bottom:14px}
    p{font-size:16px;color:var(--muted);line-height:1.7;margin-bottom:10px}
    p strong{color:var(--text)}
    .hint{font-size:13px;color:var(--muted);margin-top:24px}
    footer{border-top:1px solid var(--border);padding:32px 48px;display:flex;align-items:center;justify-content:space-between;max-width:1100px;margin:0 auto;width:100%;flex-wrap:wrap;gap:16px}
    .footer-logo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:16px;color:var(--white);text-decoration:none}
    .footer-logo span{color:var(--accent)}
    .footer-copy{font-size:13px;color:var(--muted)}
    .footer-links{display:flex;gap:24px;flex-wrap:wrap}
    .footer-links a{font-size:13px;color:var(--muted);text-decoration:none}
    .footer-links a:hover{color:var(--white)}
    @media(max-width:768px){nav{padding:16px 24px}main{padding:120px 24px 60px}footer{flex-direction:column;text-align:center;padding:28px 24px}}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="nav-logo">Axis<span>.</span>App Tech</a>
</nav>

<main>
  <div class="card">
    <div class="badge" aria-hidden="true">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 6L9 17l-5-5" stroke="#4F8EF7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h1>Email confirmed</h1>
    <p>Your <strong>Flick Match</strong> account is verified.</p>
    <p>Open the Flick Match app on your phone and sign in to start matching.</p>
    <p class="hint">You can close this tab.</p>
  </div>
</main>

<footer>
  <a href="index.html" class="footer-logo">Axis<span>.</span>App Tech</a>
  <span class="footer-copy">© 2026 Axis App Tech LLC. All rights reserved.</span>
  <div class="footer-links">
    <a href="index.html">Home</a>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
    <a href="delete-account.html">Delete Account</a>
    <a href="index.html#contact">Contact</a>
  </div>
</footer>
<script>
  // Supabase appends the session tokens to this page's URL fragment after
  // confirming. We don't use them here — strip the fragment so the access token
  // doesn't linger in the address bar or browser history.
  if (window.location.hash) {
    history.replaceState(null, '', window.location.pathname + window.location.search);
  }
</script>
</body>
</html>
